---

- name: Configure BGP Process and Neighbors
  cisco.nxos.nxos_bgp_global:
    config:
      as_number: "{{ bgp.asn }}"
      router_id: "{{ bgp_rid.router_id }}"
      neighbors:
        - neighbor_address: "{{ item.neighbor }}"
          remote_as: "{{ item.remote_as }}"
          update_source: "{{ item.update_source }}"
    state: merged
  loop: "{{ bgp.neighbors }}"

- name: Enable BGP EVPN address-familiy
  cisco.nxos.nxos_bgp_address_family:
    config:
      as_number: "{{ bgp.asn }}"
      address_family:
        - afi: l2vpn
          safi: evpn
    state: merged


- name: Configure BGP Neighbor Address-Families
  cisco.nxos.nxos_bgp_neighbor_address_family:
    config:
      as_number: "{{ bgp.asn }}"
      neighbors:
        - neighbor_address: "{{ item.neighbor }}"
          address_family:
            - afi: l2vpn
              safi: evpn
              route_reflector_client: "{{ 'yes' if inventory_hostname in groups['leafs'] else 'no' }}"
              send_community:
                both: yes
    state: merged
  loop: "{{ bgp.neighbors }}"