features:
  - isis
  - pim
  - bgp
  - nv overlay
  - vn-segment-vlan-based
  - interface-vlan
  - ngmvpn
  - netconf 
  - restconf 

bgp:
  asn: 65000
  neighbors:
    - neighbor: 100.64.60.1
      remote_as: 65000
      update_source: loopback0
    - neighbor: 100.64.60.2
      remote_as: 65000
      update_source: loopback0

L3VNI_interfaces:
  - name: Ethernet1/3

L2VNI_interfaces:
  - name: Ethernet1/4

L2VNI_services:
  - vrf_name: 40
    vlan_name: VLAN40
    vlan_id: 40
    vni_id: 40
    addr: 172.16.40.254
    mask: 255.255.255.0
    mcast_grp: 239.255.255.40

L3VNI_services:
  - vrf_name: 10
    vlan_name: VLAN10
    vlan_id: 10
    vni_id: 10
    addr: 172.16.10.1
    mask: 255.255.255.248
    mcast_grp: 239.255.255.10
  - vrf_name: 20
    vlan_name: VLAN20
    vlan_id: 20
    vni_id: 20
    addr: 172.16.20.1
    mask: 255.255.255.248
    mcast_grp: 239.255.255.20
  - vrf_name: 30
    vlan_name: VLAN30
    vlan_id: 30
    vni_id: 30
    addr: 172.16.30.1
    mask: 255.255.255.248
    mcast_grp: 239.255.255.30